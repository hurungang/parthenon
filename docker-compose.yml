services:
  postgres:
    image: postgres:16
    container_name: parthenon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parthenon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parthenon}
      POSTGRES_DB: ${POSTGRES_DB:-parthenon}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parthenon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parthenon

  redis:
    image: redis:7-alpine
    container_name: parthenon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parthenon

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: parthenon-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev --health-enabled=true --import-realm
    ports:
      - "8082:8080"
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo '' >&3 && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - parthenon

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parthenon-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-parthenon}:${POSTGRES_PASSWORD:-parthenon}@postgres:5432/${POSTGRES_DB:-parthenon}
      REDIS_URL: redis://redis:6379/0
      OIDC_PROVIDER_URL: ${OIDC_PROVIDER_URL:-http://keycloak:8080/realms/parthenon}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CREDENTIAL_VAULT_KEY: ${CREDENTIAL_VAULT_KEY:-change-me-32-byte-key-for-aes256!}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: parthenon-api
      OTEL_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parthenon

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parthenon-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api/v1}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost/ws}
      VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-http://localhost:8082/realms/parthenon}
      VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-parthenon-ui}
      VITE_OTEL_COLLECTOR_URL: ${VITE_OTEL_COLLECTOR_URL:-http://localhost:4318}
      VITE_OTEL_SERVICE_NAME: parthenon-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - parthenon

  nginx:
    image: nginx:1.25-alpine
    container_name: parthenon-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - parthenon

  # ── Observability Stack ────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: parthenon-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Collector internal metrics
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # Health check
      - "55679:55679" # zPages
    depends_on:
      - jaeger
      - loki
    networks:
      - parthenon
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: parthenon-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector HTTP
      - "14317:4317"  # OTLP gRPC (mapped to host 14317 to avoid collision)
    networks:
      - parthenon
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: parthenon-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - parthenon
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.0
    container_name: parthenon-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - parthenon
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:

networks:
  parthenon:
    driver: bridge
