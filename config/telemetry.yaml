# ============================================================
# Parthenon — Telemetry Configuration Sample
# ============================================================
#
# Copy this file to the same location as identity.yaml and
# set TELEMETRY_YAML_PATH (if using a custom path) to point
# to it, or use environment variables to override individual
# fields (TELEMETRY__<FIELD_NAME>).
#
# All fields are optional — defaults are shown in comments.
# ============================================================

# ── Active export targets ─────────────────────────────────────────────────────
# Supported values: console, file, otlp, logfire, custom
# Multiple exporters can be active simultaneously.
# Default: [otlp]
exporters:
  - file

# ── Signal enable flags ───────────────────────────────────────────────────────
# Set to false to disable an entire signal type.  A no-op provider is registered
# for disabled signals so instrumented code continues to function without errors.
# Default: all true
traces_enabled: true
metrics_enabled: true
logs_enabled: true

# ── Service identity ──────────────────────────────────────────────────────────
# The service name attached to all OTEL spans, metrics, and logs.
# Default: "parthenon-api"
service_name: "parthenon-api"

# ── OTLP exporter options ─────────────────────────────────────────────────────
# Used when "otlp" is listed in exporters.
otlp:
  # gRPC endpoint (default) or HTTP endpoint — must match the protocol below.
  endpoint: "http://localhost:4317"
  # "grpc" (default) or "http"
  protocol: "grpc"
  # Disable TLS certificate verification (suitable for local dev only).
  insecure: true

# ── File exporter options ─────────────────────────────────────────────────────
# Used when "file" is listed in exporters.
# Spans, metrics, and logs are all written to the same rotating file.
file:
  path: "logs/otel.log"
  # Maximum size of each log file in bytes before rotation (default: 10 MB).
  max_bytes: 10485760
  # Number of rotated backup files to keep (default: 5).
  backup_count: 5

# ── Logfire exporter options ──────────────────────────────────────────────────
# Used when "logfire" is listed in exporters.
# Requires the "logfire" Python package (pip install logfire).
# The token is mandatory; if absent the exporter is skipped with a warning.
logfire:
  token: null   # Set to your Logfire project token

# ── Custom endpoint exporter options ─────────────────────────────────────────
# Used when "custom" is listed in exporters.
# Sends spans/metrics/logs over OTLP HTTP to the configured URL.
# Suitable for self-hosted collectors (Grafana Alloy, Honeycomb, etc.).
custom:
  endpoint: "http://localhost:4318"

# ── Per-component log levels ──────────────────────────────────────────────────
# Map of logger name → level string.  "root" maps to the root logger.
# Valid levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
# Default: {"root": "INFO"}
#
# Examples:
#   root: DEBUG            — verbose output for all loggers
#   app.services: WARNING  — suppress service-layer debug/info logs
#   uvicorn: ERROR         — silence uvicorn access logs
log_levels:
  root: "INFO"
  # app.services: "DEBUG"
  # uvicorn.access: "WARNING"

# ============================================================
# Multiple-exporter example (console + OTLP for local dev):
# ============================================================
#
# exporters:
#   - console
#   - otlp
# otlp:
#   endpoint: "http://otel-collector:4317"
#   protocol: "grpc"
#   insecure: true
#
# ============================================================
# Kubernetes ConfigMap usage:
# ============================================================
#
# Mount this file as a ConfigMap volume and set:
#   TELEMETRY_YAML_PATH=/etc/parthenon/telemetry.yaml
#
# Individual fields can still be overridden per-pod via env vars:
#   TELEMETRY__TRACES_ENABLED=false
#   TELEMETRY__OTLP__ENDPOINT=http://collector.monitoring.svc:4317
# ============================================================
