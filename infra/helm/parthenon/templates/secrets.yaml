{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "parthenon.secretName" . }}
  labels:
    {{- include "parthenon.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  SECRET_KEY: {{ required "secrets.secretKey is required" .Values.secrets.secretKey | quote }}
  CREDENTIAL_VAULT_KEY: {{ required "secrets.credentialVaultKey is required" .Values.secrets.credentialVaultKey | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | default "" | quote }}
{{- end }}
